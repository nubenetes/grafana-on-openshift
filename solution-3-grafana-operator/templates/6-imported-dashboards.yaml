# https://grafana.com/grafana/dashboards/12937-thanos-overview-public/
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: thanos-overview
  namespace: grafana-operator
spec:
  folder: grafana.com
  resyncPeriod: 30s
  #resyncPeriod: 0m
  instanceSelector:
    matchLabels:
      dashboards: "grafana-dashboards"
  grafanaCom:
    id: 12937
