# https://www.redhat.com/en/blog/thanos-querier-versus-thanos-querier
# https://cloud.redhat.com/experts/o11y/ocp-grafana/
# https://grafana.github.io/grafana-operator/docs/datasources/
# https://grafana.com/grafana/plugins/
# https://grafana.github.io/grafana-operator/docs/examples/datasource_variables/readme/
