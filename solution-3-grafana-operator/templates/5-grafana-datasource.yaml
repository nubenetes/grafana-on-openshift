###########################################################################################
# Equivale a:
# oc adm policy add-cluster-role-to-user cluster-monitoring-view -z grafana-instance-sa
# oc adm policy remove-cluster-role-from-user cluster-monitoring-view -z grafana-instance-sa
###########################################################################################
# ---
# apiVersion: v1
# kind: Secret
# metadata:
#   name: prometheus-token
#   namespace: grafana-operator
#   annotations:
#     kubernetes.io/service-account.name: "grafana-instance-sa"
# type: kubernetes.io/service-account-token
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: prometheus-grafanadatasource
  namespace: grafana-operator
spec:
  # valuesFrom:
  #   - targetPath: "secureJsonData.httpHeaderValue1"
  #     valueFrom:
  #       secretKeyRef:
  #         name: "prometheus-token"
  #         key: "token"
  instanceSelector:
    matchLabels:
      dashboards: "grafana-dashboards"
  datasource:
    name: prometheus-grafanadatasource
    type: prometheus
    uid: prometheus-grafanadatasource
    access: proxy
    url: 'https://thanos-querier.openshift-monitoring.svc.cluster.local:9091'
    isDefault: true
    secureJsonData:
      #httpHeaderValue1: 'Bearer ${token}'
      httpHeaderValue1: 'Bearer ${BEARER_TOKEN}'
    jsonData:
      httpHeaderName1: Authorization
      'tlsSkipVerify': true
      'timeInterval': "5s"
    editable: true
  plugins: # https://grafana.github.io/grafana-operator/docs/datasources/
    - name: grafana-clock-panel # https://grafana.com/grafana/plugins/grafana-clock-panel/
      version: 2.1.5
    - name: grafana-datadog-datasource # https://grafana.com/grafana/plugins/grafana-datadog-datasource/
      version: 3.7.2
    - name: grafana-gitlab-datasource # https://grafana.com/grafana/plugins/grafana-gitlab-datasource/
      version: 1.8.1
    - name: grafana-jira-datasource # https://grafana.com/grafana/plugins/grafana-jira-datasource/
      version: 1.9.4
    - name: marcusolsson-csv-datasource # https://grafana.com/grafana/plugins/marcusolsson-csv-datasource/
      version: 0.6.17
    - name: grafana-llm-app # https://grafana.com/grafana/plugins/grafana-llm-app/
      version: 0.10.4
---
